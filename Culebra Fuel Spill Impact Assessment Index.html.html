ee <a target='_blank' href='https://links.esri.com/demographics/acs'>ACS data</a> for more information."},"PETSPETPRODUCTSMP26004H_B":{"type":"number","alias":"2025 HH Owns 1+ Dogs","vintage":"2025","source":"Esri-MRI-Simmons","units":null,"decimals":null,"definition":"Esri 2025 estimate of the expected number of households and Market Potential Index (MPI) for <em>Owns 1+ Dogs</em> in the geographic area. Esri’s Market Potential data provides information about the likely demand for specific products or services, as well as expected consumer attitudes and behaviors, in an area. The MPI compares local consumer demand, attitudes, and behaviors to U.S. levels. The MPI value for the U.S. is 100. If, for example, the MPI value for a geographic area is 80 this implies that consumer demand in the geographic area is likely to be 20% less than the U.S. average. Sources: Esri and MRI-Simmons. See <a target='_blank' href='https://links.esri.com/demographics/market-potential'>Market Potential data</a> for more information."},"HOUSINGHOUSEHOLDX3044_X_A":{"type":"number","alias":"2025 Insurance (Owner/Renter): Average","vintage":"2025","source":"Esri-U.S. BLS","units":null,"decimals":null,"definition":"Esri 2025 estimates of the total (aggregate) amount spent, average amount spent per household, and Spending Potential Index (SPI) on <em>Insurance (Owner & Renter)</em> in the geographic area. Includes expected spending on both homeowner's and tenant's insurance combined. Esri’s Consumer Spending data provides information about the estimated spending by households for goods and services in an area. The aggregate value represents the total amount spent by all households. The average value represents the typical amount spent per household. The SPI compares average local expenditures to U.S. levels. The SPI value for the U.S. is 100. If, for example, the SPI value for a geographic area is 120 this implies that average spending by consumers in the geographic area is likely to be 20 perc ehaviors, in an area. The MPI compares local consumer demand, attitudes, and behaviors to U.S. levels. The MPI value for the U.S. is 100. If, for example, the MPI value for a geographic area is 80 this implies that consumer demand in the geographic area is likely to be 20% less than the U.S. average. Sources: Esri and MRI-Simmons. See <a target='_blank' href='https://links.esri.com/demographics/market-potential'>Market Potential data</a> for more information."},"dataCollectionsCalculator.HOUSINGHOUSEHOLDX3044_X_A":{"id":"X3044_X_A","fullName":"HousingHousehold.X3044_X_A","alias":"2025 Insurance (Owner/Renter): Average","fieldName":"HOUSINGHOUSEHOLDX3044_X_A","precision":2,"calculatorName":"dataCollectionsCalculator","templateName":"dataCollectionsCalculator.HOUSINGHOUSEHOLDX3044_X_A","type":"esriFieldTypeDouble","vintage":"2025","source":"Esri-U.S. BLS","definition":"Esri 2025 estimates of the total (aggregate) amount spent, average amount spent per household, and Spending Potential Index (SPI) on <em>Insurance (Owner & Renter)</em> in the geographic area. Includes expected spending on both homeowner's and tenant's insurance combined. Esri’s Consumer Spending data provides information about the estimated spending by households for goods and services in an area. The aggregate value represents the total amount spent by all households. The average value represents the typical amount spent per household. The SPI compares average local expenditures to U.S. levels. The SPI value for the U.S. is 100. If, for example, the SPI value for a geographic area is 120 this implies that average spending by consumers in the geographic area is likely to be 20 percent more than the U.S. average. Sources: Esri and Bureau of Labor Statistics. See <a target='_blank' href='https://links.esri.com/demographics/consumer-spending'>Consumer Spending data</a> for more information."},"dataCollectionsCalculator.CUSTOMFFD58A4371B748599DE75A05114927D1":{"id":"CUSTOMFFD58A4371B748599DE75A05114927D1",
